repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff Check
        entry: uv run ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: Ruff Format Check
        entry: uv run ruff format --check
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: Pytest Suite
        entry: uv run pytest -q
        language: system
        types: [python]
        pass_filenames: false
