name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, such as v0.5.3
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: release
          save-cache: false
          version: "latest"

      - name: Install Dependencies
        run: |
          uv sync --extra dev --extra gemini

      - name: Verify Release Tag Matches Package Version
        run: |
          uv run python scripts/verify_release_tag.py --tag "$RELEASE_TAG"

      - name: Run Release Verification
        run: |
          make verify

      - name: Build Release Artifacts
        run: |
          rm -rf dist
          uv build
          scripts/check-license-policy.sh --scan-archives
          uv run python scripts/release_artifact_manifest.py dist/*.tar.gz dist/*.whl

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/SHA256SUMS.txt \
            dist/*.tar.gz \
            dist/*.whl \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --verify-tag

      - name: Verify Published Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run python scripts/verify_release_assets.py \
            --tag "$RELEASE_TAG" \
            --repo uesugitorachiyo/agy-swarms
