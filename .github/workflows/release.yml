name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish, such as v0.5.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          version: "latest"

      - name: Install Dependencies
        run: |
          uv sync --extra dev --extra gemini

      - name: Verify Release Tag Matches Package Version
        run: |
          uv run python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"release tag {tag!r} does not match pyproject.toml version {version!r}")
          PY

      - name: Run Release Verification
        run: |
          make verify

      - name: Build Release Artifacts
        run: |
          rm -rf dist
          uv build

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/*.tar.gz \
            dist/*.whl \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --verify-tag
