name: CI

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Codebase (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          version: "latest"

      - name: Install Dependencies
        run: |
          uv sync --extra dev

      - name: Run Ruff Lints
        run: |
          uv run ruff check .

      - name: Run Unit Tests
        run: |
          uv run pytest -q

      - name: Build Package
        run: |
          uv build
