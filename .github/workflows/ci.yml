name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  license-policy:
    name: License Policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check License Policy
        run: scripts/check-license-policy.sh

  fast-checks:
    name: Fast Checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025-vs2026
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: ci-fast-${{ matrix.os }}
          save-cache: ${{ github.ref == 'refs/heads/main' }}
          version: "latest"

      - name: Install Dependencies
        run: |
          uv sync --extra dev --extra gemini

      - name: Run Fast Verification
        run: |
          make verify-fast

  package-install-modes:
    name: Verify Package Install Modes
    runs-on: ubuntu-latest
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: ci-package-install
          save-cache: ${{ github.ref == 'refs/heads/main' }}
          version: "latest"

      - name: Verify Core Install
        run: |
          uv venv .venv-core
          uv pip install --python .venv-core/bin/python .
          .venv-core/bin/python -c "from agy_swarms.adapters.scripted import ScriptedAdapter; print(ScriptedAdapter.accounting)"

      - name: Verify Gemini Extra Install
        run: |
          uv venv .venv-gemini
          uv pip install --python .venv-gemini/bin/python '.[gemini]'
          .venv-gemini/bin/python -c "from agy_swarms.adapters.gemini_api import GeminiApiAdapter; print(GeminiApiAdapter.accounting)"

  release-health:
    name: Release Health
    runs-on: ubuntu-latest
    needs: fast-checks
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: ci-release-health
          save-cache: ${{ github.ref == 'refs/heads/main' }}
          version: "latest"

      - name: Install Dependencies
        run: |
          uv sync --extra dev --extra gemini

      - name: Run Release Health
        run: |
          make release-health
